<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Spelling & Grammar Checker</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        width: 70%;
        max-width: 800px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        border-radius: 15px;
        padding: 25px;
        color: white;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        animation: fadeIn 0.6s ease-in-out;
    }

    h1 {
        margin-bottom: 15px;
        font-weight: 600;
    }

    textarea {
        width: 100%;
        height: 140px;
        padding: 12px;
        font-size: 15px;
        border-radius: 10px;
        border: none;
        outline: none;
        resize: none;
        background: rgba(255,255,255,0.9);
        color: #333;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
    }

    textarea:focus {
        box-shadow: 0 0 10px rgba(255,255,255,0.6);
    }

    button {
        margin-top: 15px;
        padding: 12px 25px;
        font-size: 15px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #00c6ff, #0072ff);
        color: white;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    #output {
        margin-top: 20px;
        text-align: left;
        background: rgba(255,255,255,0.1);
        padding: 15px;
        border-radius: 10px;
    }

    .error {
        background: #ff6b6b;
        padding: 3px 6px;
        border-radius: 5px;
        color: white;
    }

    .suggestion {
        color: #00ffcc;
        font-weight: bold;
        cursor: pointer;
        margin-right: 6px;
        transition: 0.2s;
    }

    .suggestion:hover {
        color: #00ffaa;
        text-decoration: underline;
    }

    p {
        margin-bottom: 8px;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>🧠 Spelling & Grammar Checker</h1>

    <textarea id="textInput" placeholder="Type your text here..."></textarea>

    <br>
    <button onclick="checkText()">Check Now</button>

    <div id="output"></div>
</div>

<script>
let currentText = "";

async function checkText() {
    const text = document.getElementById("textInput").value;
    currentText = text;

    if (!text.trim()) {
        alert("Please enter some text!");
        return;
    }

    document.getElementById("output").innerHTML = "⏳ Checking...";

    try {
        const response = await fetch("https://api.languagetool.org/v2/check", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: `text=${encodeURIComponent(text)}&language=en-US`
        });

        const data = await response.json();

        if (data.matches.length === 0) {
            document.getElementById("output").innerHTML =
                "<p>✅ No mistakes found!</p>";
            return;
        }

        let resultHTML = "<h3>❌ Click a suggestion to fix:</h3>";

        data.matches.forEach((match) => {
            let wrongWord = text.substr(match.offset, match.length);

            let suggestionsHTML = match.replacements.map(rep => {
                return `<span class="suggestion" onclick="replaceWord('${wrongWord}', '${rep.value}')">${rep.value}</span>`;
            }).join(", ");

            resultHTML += `
                <p>
                    <span class="error">${wrongWord}</span> →
                    ${suggestionsHTML || "No suggestion"}
                </p>
            `;
        });

        document.getElementById("output").innerHTML = resultHTML;

    } catch (error) {
        document.getElementById("output").innerHTML =
            "⚠️ API connection error.";
        console.error(error);
    }
}

function replaceWord(wrong, correct) {
    let textarea = document.getElementById("textInput");

    let updatedText = textarea.value.replace(wrong, correct);

    textarea.value = updatedText;

    checkText();
}
</script>

</body>
</html>
